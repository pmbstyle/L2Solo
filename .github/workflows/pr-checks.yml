name: PR checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  node-tests:
    name: Node tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Check syntax
        run: npm run check

      - name: Run tests
        run: npm test
